<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>πολλά ζητάς</title>
  <!-- QRCode library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    /* --- Γραμματοσειρές --- */
    /* Normung (παρόμοια με DIN) */
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
    /* Century Gothic / Futura */
    @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&display=swap');
    /* Albertus Nova (παρόμοια με serif με χαρακτήρα) */
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', 'Normung', 'DIN', sans-serif;
      background: #0b0e14;
      color: #eef2fb;
      padding: 20px 16px 40px;
      min-height: 100vh;
      line-height: 1.5;
    }

    .app {
      max-width: 1440px;
      margin: 0 auto;
    }

    /* Τίτλος – Century Gothic */
    h1 {
      font-family: 'Jost', 'Century Gothic', 'Futura', sans-serif;
      font-size: 2.8rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: -0.02em;
      background: linear-gradient(145deg, #c7b3ff, #7ef5e6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 4px 20px rgba(187, 134, 252, 0.3);
    }

    /* Dashboard grid */
    .dashboard {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    @media (min-width: 1000px) {
      .dashboard {
        grid-template-columns: 1fr 1fr 1.3fr;
      }
    }

    /* Κάρτες – γυάλινο εφέ */
    .card {
      background: rgba(22, 28, 36, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 36px;
      padding: 24px 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      border: 1px solid rgba(255, 255, 255, 0.08);
      height: fit-content;
      transition: transform 0.2s ease;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .card-header h2 {
      font-family: 'Jost', 'Century Gothic', sans-serif;
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #ffffff;
    }

    .accent-bar {
      width: 8px;
      height: 34px;
      border-radius: 20px;
      background: linear-gradient(145deg, #bb86fc, #03dac6);
      box-shadow: 0 0 12px #03dac6;
    }

    /* Λίστα παρατάξεων */
    .party-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .party-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .party-color {
      width: 24px;
      height: 24px;
      border-radius: 10px;
      flex-shrink: 0;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .party-name-input {
      flex: 2;
      min-width: 0;
    }

    .party-name-input input {
      width: 100%;
      background: rgba(10, 15, 20, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      padding: 14px 16px;
      color: white;
      font-family: 'Jost', 'Century Gothic', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      outline: none;
      transition: all 0.2s;
    }
    .party-name-input input:focus {
      border-color: #bb86fc;
      background: rgba(20, 28, 38, 0.8);
      box-shadow: 0 0 0 3px rgba(187, 134, 252, 0.2);
    }

    .vote-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .vote-btn {
      width: 46px;
      height: 46px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 1.8rem;
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      backdrop-filter: blur(5px);
      transition: all 0.15s;
    }
    .vote-btn:hover {
      background: rgba(187, 134, 252, 0.3);
      border-color: #bb86fc;
    }
    .vote-btn.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    .vote-input {
      width: 70px;
      background: rgba(10, 15, 20, 0.7);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 14px 6px;
      text-align: center;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      outline: none;
    }
    .vote-input:focus {
      border-color: #03dac6;
      box-shadow: 0 0 0 3px rgba(3, 218, 198, 0.2);
    }

    .blank-badge {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(4px);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #ccd;
      letter-spacing: 0.3px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .reset-btn {
      background: rgba(207, 102, 121, 0.2);
      border: 1px solid rgba(207, 102, 121, 0.5);
      color: #ffb7c5;
      padding: 16px 18px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      width: 100%;
      margin-top: 20px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: 0.2s;
    }
    .reset-btn:hover {
      background: rgba(207, 102, 121, 0.35);
      border-color: #cf6679;
    }

    /* Στατιστικά */
    .stats-row {
      display: flex;
      justify-content: space-around;
      margin: 24px 0 8px;
    }
    .stat {
      text-align: center;
    }
    .stat-value {
      font-family: 'Cinzel', 'Albertus Nova', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }
    .stat-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aab3c5;
    }

    /* Πίνακας εδρών */
    .seats-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }
    .seats-table th {
      text-align: left;
      padding-bottom: 10px;
      font-family: 'Cinzel', 'Albertus Nova', serif;
      font-weight: 600;
      color: #b9c2d9;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .seats-table td {
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-family: 'Cinzel', 'Albertus Nova', serif;
    }
    .party-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .seats-number {
      font-weight: 700;
      font-size: 1.5rem;
      color: #03dac6;
    }
    .koutsi-badge {
      background: #03dac6;
      color: #0b0e14;
      padding: 4px 10px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: bold;
      margin-left: 12px;
      font-family: 'DM Sans', sans-serif;
    }

    /* Κουτί κουτσών */
    .log-box {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 28px;
      padding: 20px;
      margin-top: 24px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .log-box h3 {
      margin-bottom: 16px;
      font-family: 'Jost', sans-serif;
      font-size: 1.3rem;
      font-weight: 500;
      color: #ddd;
    }
    .log-entry {
      font-size: 0.95rem;
      padding: 8px 0;
      border-bottom: 1px dashed rgba(255,255,255,0.1);
      font-family: 'DM Sans', sans-serif;
    }
    .next-koutsi {
      margin-top: 20px;
      font-weight: 600;
      font-size: 1.1rem;
      font-family: 'Jost', sans-serif;
    }

    /* Γράφημα */
    .chart-container {
      height: 360px;
      width: 100%;
    }

    /* Ρυθμίσεις */
    .settings-section {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }
    @media (min-width: 700px) {
      .settings-section {
        grid-template-columns: 1fr 1fr;
      }
    }
    .settings-grid {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .setting-item {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .setting-item label {
      width: 120px;
      font-family: 'Jost', sans-serif;
      font-weight: 500;
      color: #ccd6f0;
    }
    .setting-item input, .setting-item select {
      flex: 1;
      background: rgba(10, 15, 20, 0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 60px;
      padding: 14px 20px;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
    }
    .quota-display {
      flex: 1;
      background: rgba(0,0,0,0.3);
      border-radius: 60px;
      padding: 14px 20px;
      text-align: center;
      font-weight: bold;
      color: #03dac6;
      font-size: 1.5rem;
      font-family: 'Cinzel', serif;
      border: 1px solid #03dac6;
    }

    .state-box {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .state-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .state-input {
      flex: 3;
      min-width: 240px;
      background: rgba(0,0,0,0.3);
      border: 1px solid #3a4458;
      border-radius: 60px;
      padding: 16px 22px;
      color: white;
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
    }
    .preset-select {
      flex: 1;
      min-width: 150px;
      background: #1e2632;
      border-radius: 60px;
      padding: 16px 22px;
      color: white;
      font-family: 'Jost', sans-serif;
      border: 1px solid #3a4458;
    }
    .button-group {
      display: flex;
      gap: 12px;
    }
    .button-group button {
      flex: 1;
      background: rgba(187, 134, 252, 0.15);
      border: 1px solid #bb86fc;
      border-radius: 60px;
      padding: 16px 0;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      font-family: 'Jost', sans-serif;
      backdrop-filter: blur(4px);
      cursor: pointer;
      transition: 0.2s;
    }
    .button-group button:hover {
      background: #bb86fc;
      color: #0b0e14;
    }

    #qrCanvas {
      background: white;
      padding: 10px;
      border-radius: 24px;
      width: 180px;
      height: 180px;
      margin: 10px auto;
      display: block;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    /* remove spinner */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] { -moz-appearance: textfield; appearance: textfield; }
  </style>
  <!-- React & βιβλιοθήκες -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.15.3/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
</head>
<body>
<div class="app">
  <h1>🗳️ Πόση ώρα θα σου πάρει να βρεις την έδρα;</h1>
  <div id="root"></div>
</div>

<script type="text/babel">
  const { useState, useMemo, useEffect, useRef } = React;
  const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, LabelList, Cell, ReferenceLine } = Recharts;

  const PARTY_COLORS = ["#f58231", "#3cb44b", "#e6194b", "#ffb6c1", "#4363d8", "#911eb4", "#46f0f0", "#aaaaaa", "#888888"];

  const initialForces = [
    { id: "pasp", name: "ΠΑΣΠ", votes: 180, color: PARTY_COLORS[0] },
    { id: "kke", name: "ΚΚΕ", votes: 155, color: PARTY_COLORS[1] },
    { id: "eaak", name: "ΕΑΑΚ", votes: 110, color: PARTY_COLORS[2] },
    { id: "aran", name: "ΑΡΑΝ", votes: 22, color: PARTY_COLORS[3] },
    { id: "nar", name: "ΝΑΡ", votes: 11, color: PARTY_COLORS[4] },
    { id: "dap", name: "ΔΑΠ", votes: 27, color: PARTY_COLORS[5] },
    { id: "ssp", name: "ΣΣΠ", votes: 3, color: PARTY_COLORS[6] },
    { id: "diktyo", name: "Δίκτυο", votes: 0, color: PARTY_COLORS[7] },
    { id: "blank", name: "Λευκά", votes: 7, isWhite: true, color: PARTY_COLORS[8] },
  ];

  const PRESETS = {
    "CEID25": "7,13,1,148,150,107,33,5,36,2,4,11",
    "CEID24": "7,8,1,177,186,85,31,10,23,4,0,7"
  };

  const encodeState = (seats, invalid, roundUp, forces) => {
    const votes = forces.map(f => f.votes);
    return [seats, invalid, roundUp ? 1 : 0, ...votes].join(',');
  };

  const decodeState = (code) => {
    const parts = code.split(',').map(p => parseInt(p, 10));
    if (parts.length !== 12) throw new Error("Λάθος μήκος κωδικού");
    return { seats: parts[0], invalid: parts[1], roundUp: parts[2] === 1, votes: parts.slice(3) };
  };

  const App = () => {
    const [forces, setForces] = useState(initialForces);
    const [totalSeats, setTotalSeats] = useState(7);
    const [invalidVotes, setInvalidVotes] = useState(0);
    const [roundUp, setRoundUp] = useState(false);
    const [configCode, setConfigCode] = useState("");
    const [selectedPreset, setSelectedPreset] = useState("");
    const qrCanvasRef = useRef(null);

    const totalValidVotes = useMemo(() => forces.reduce((s, f) => s + f.votes, 0), [forces]);
    const validForces = useMemo(() => forces.filter(f => !f.isWhite), [forces]);
    const blankVotes = forces.find(f => f.isWhite)?.votes || 0;
    const totalVoted = totalValidVotes + invalidVotes;

    const quota = useMemo(() => {
      const validSum = validForces.reduce((s, f) => s + f.votes, 0);
      if (validSum === 0 || totalSeats === 0) return 0;
      const raw = validSum / totalSeats;
      return roundUp ? Math.ceil(raw) : Math.floor(raw);
    }, [validForces, totalSeats, roundUp]);

    const { finalResults, seatLog, nextKoutsi, nextRemainder } = useMemo(() => {
      if (quota <= 0) return { finalResults: [], seatLog: [], nextKoutsi: null, nextRemainder: 0 };
      let temp = validForces.map(f => {
        const fullSeats = Math.floor(f.votes / quota);
        const remainder = f.votes - fullSeats * quota;
        return { ...f, fullSeats, finalSeats: fullSeats, remainder };
      });
      const log = [];
      const allocated = temp.reduce((s, r) => s + r.fullSeats, 0);
      let remaining = totalSeats - allocated;
      for (let i = 0; i < remaining; i++) {
        temp.sort((a, b) => b.remainder - a.remainder || b.votes - a.votes);
        const sel = temp[0];
        if (!sel) break;
        log.push(`Κουτσή έδρα #${i+1} ➜ ${sel.name} (υπόλοιπο ${sel.remainder})`);
        sel.finalSeats++;
        sel.remainder = 0;
      }
      temp.sort((a, b) => b.remainder - a.remainder || b.votes - a.votes);
      const next = temp[0];
      temp.sort((a, b) => b.votes - a.votes);
      return {
        finalResults: temp,
        seatLog: log,
        nextKoutsi: next && next.remainder > 0 ? next.name : null,
        nextRemainder: next ? next.remainder : 0
      };
    }, [validForces, totalSeats, quota]);

    useEffect(() => {
      const code = encodeState(totalSeats, invalidVotes, roundUp, forces);
      setConfigCode(code);
    }, [forces, totalSeats, invalidVotes, roundUp]);

    useEffect(() => {
      if (qrCanvasRef.current && configCode) {
        try { QRCode.toCanvas(qrCanvasRef.current, configCode, { width: 180, margin: 2 }); } catch (e) {}
      }
    }, [configCode]);

    const applyCode = (code) => {
      try {
        const { seats, invalid, roundUp, votes } = decodeState(code);
        setTotalSeats(seats);
        setInvalidVotes(invalid);
        setRoundUp(roundUp);
        setForces(prev => prev.map((f, i) => ({ ...f, votes: votes[i] })));
        return true;
      } catch { alert("Μη έγκυρος κωδικός"); return false; }
    };

    const applyPreset = (key) => { if (PRESETS[key]) applyCode(PRESETS[key]); };

    const updateVote = (idx, delta) => {
      setForces(prev => {
        const upd = [...prev];
        upd[idx] = { ...upd[idx], votes: Math.max(0, upd[idx].votes + delta) };
        return upd;
      });
    };
    const setVote = (idx, val) => {
      const v = Math.max(0, parseInt(val) || 0);
      setForces(prev => { const upd = [...prev]; upd[idx] = { ...upd[idx], votes: v }; return upd; });
    };
    const updateName = (idx, name) => {
      setForces(prev => { const upd = [...prev]; upd[idx] = { ...upd[idx], name }; return upd; });
    };
    const resetVotes = () => setForces(prev => prev.map(f => ({ ...f, votes: 0 })));

    const renderCustomLabel = (props) => {
      const { x, y, width, height, index } = props;
      const e = finalResults[index];
      if (!e) return null;
      const rem = e.votes - Math.floor(e.votes / (quota || 1)) * (quota || 1);
      const isLast = seatLog.length > 0 && e.name === seatLog[seatLog.length-1].split("➜ ")[1];
      return (
        <React.Fragment>
          <text x={Number(x)+8} y={Number(y)+Number(height)/2} fill="#fff" fontSize={15} fontWeight="bold" fontFamily="'DM Sans', sans-serif" dominantBaseline="middle">
            {`${e.name} – ${e.votes} – ${e.finalSeats} – [${rem}]`}
          </text>
          {isLast && (
            <text x={Number(x)+Number(width)+10} y={Number(y)+Number(height)/2} fill="#03dac6" fontSize={17} fontWeight="bold" fontFamily="'Jost', sans-serif" dominantBaseline="middle">
              ΚΟΥΤΣΗ
            </text>
          )}
        </React.Fragment>
      );
    };

    return (
      <div>
        <div className="dashboard">
          {/* Στήλη 1 – Ψήφοι */}
          <div className="card">
            <div className="card-header">
              <div className="accent-bar"></div>
              <h2>📋 Ψηφοφορία</h2>
            </div>
            <div className="party-list">
              {forces.map((f, i) => (
                <div key={f.id} className="party-row">
                  <div className="party-color" style={{backgroundColor: f.color}}></div>
                  <div className="party-name-input">
                    <input type="text" value={f.name} onChange={e => updateName(i, e.target.value)} />
                  </div>
                  <div className="vote-controls">
                    <div className={`vote-btn ${f.votes <= 0 ? 'disabled' : ''}`} onClick={() => updateVote(i, -1)}>–</div>
                    <input className="vote-input" type="number" min="0" value={f.votes} onChange={e => setVote(i, e.target.value)} />
                    <div className="vote-btn" onClick={() => updateVote(i, 1)}>+</div>
                  </div>
                  {f.isWhite && <span className="blank-badge">Λευκά</span>}
                </div>
              ))}
            </div>
            <button className="reset-btn" onClick={resetVotes}>⟲ Μηδενισμός ψήφων</button>
            <div className="stats-row">
              <div className="stat"><div className="stat-value">{totalValidVotes}</div><div className="stat-label">Έγκυρα</div></div>
              <div className="stat"><div className="stat-value">{invalidVotes}</div><div className="stat-label">Άκυρα</div></div>
              <div className="stat"><div className="stat-value">{blankVotes}</div><div className="stat-label">Λευκά</div></div>
              <div className="stat"><div className="stat-value">{totalVoted}</div><div className="stat-label">Ψήφισαν</div></div>
            </div>
          </div>

          {/* Στήλη 2 – Έδρες & Κουτσές */}
          <div className="card">
            <div className="card-header">
              <div className="accent-bar"></div>
              <h2>📊 Κατανομή</h2>
            </div>
            <table className="seats-table">
              <thead><tr><th>Παράταξη</th><th>Έδρες</th></tr></thead>
              <tbody>
                {finalResults.map((f) => (
                  <tr key={f.id}>
                    <td><div className="party-cell"><div className="party-color" style={{backgroundColor: f.color}}></div>{f.name}</div></td>
                    <td>
                      <span className="seats-number">{f.finalSeats}</span>
                      {seatLog.length > 0 && f.name === seatLog[seatLog.length-1].split("➜ ")[1] && <span className="koutsi-badge">κουτσή</span>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div className="log-box">
              <h3>📌 Κουτσές έδρες</h3>
              {seatLog.length === 0 ? <p style={{color:'#aaa'}}>—</p> : seatLog.map((line, idx) => <div key={idx} className="log-entry">{line}</div>)}
              <div className="next-koutsi">Επόμενη: <span style={{color:'#03dac6'}}>{nextKoutsi ? `${nextKoutsi} (υπ. ${nextRemainder})` : '—'}</span></div>
            </div>
          </div>

          {/* Στήλη 3 – Γράφημα */}
          <div className="card">
            <div className="card-header">
              <div className="accent-bar"></div>
              <h2>📈 Γράφημα</h2>
            </div>
            <div className="chart-container">
              {finalResults.length > 0 && quota > 0 ? (
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={finalResults} layout="vertical" margin={{left: 70, right: 25}} barCategoryGap={3}>
                    <XAxis type="number" allowDecimals={false} stroke="#8892b0" />
                    <YAxis type="category" dataKey="name" stroke="#ccd6f6" width={80} tick={{fontSize:13, fontFamily: 'Jost, sans-serif'}} />
                    <Tooltip contentStyle={{backgroundColor:"#1a2330", border:"1px solid #3a4458", borderRadius:16}} labelStyle={{color:"#fff"}} />
                    {[...Array(Math.floor(validForces.reduce((s,f)=>s+f.votes,0) / quota))].map((_,i)=>(
                      <ReferenceLine key={i} x={(i+1)*quota} stroke="#5a6380" strokeDasharray="5 5" />
                    ))}
                    <Bar dataKey="votes" barSize={30} radius={[0,8,8,0]}>
                      <LabelList content={renderCustomLabel} />
                      {finalResults.map((entry) => <Cell key={entry.id} fill={entry.color} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              ) : <div style={{height:'100%', display:'flex', alignItems:'center', justifyContent:'center', color:'#8892b0'}}>Δεν υπάρχουν δεδομένα</div>}
            </div>
          </div>
        </div>

        {/* Ρυθμίσεις & QR */}
        <div className="card">
          <div className="settings-section">
            <div className="settings-grid">
              <div className="setting-item">
                <label>🗳️ Έδρες</label>
                <input type="number" min="1" value={totalSeats} onChange={e => setTotalSeats(Math.max(1, parseInt(e.target.value)||1))} />
              </div>
              <div className="setting-item">
                <label>❌ Άκυρα</label>
                <input type="number" min="0" value={invalidVotes} onChange={e => setInvalidVotes(Math.max(0, parseInt(e.target.value)||0))} />
              </div>
            </div>
            <div className="settings-grid">
              <div className="setting-item">
                <label>📐 Στρογγυλ.</label>
                <select value={roundUp ? "up" : "down"} onChange={e => setRoundUp(e.target.value==="up")}>
                  <option value="down">Κάτω (⌊⌋)</option>
                  <option value="up">Πάνω (⌈⌉)</option>
                </select>
              </div>
              <div className="setting-item">
                <label>📏 Μέτρο</label>
                <div className="quota-display">{quota}</div>
              </div>
            </div>
            <div className="state-box">
              <div className="state-row">
                <input className="state-input" value={configCode} onChange={e => setConfigCode(e.target.value)} placeholder="Κωδικός κατάστασης" />
                <select className="preset-select" value={selectedPreset} onChange={e => { setSelectedPreset(e.target.value); if(e.target.value) applyPreset(e.target.value); }}>
                  <option value="">— Presets —</option>
                  <option value="CEID25">CEID25</option>
                  <option value="CEID24">CEID24</option>
                </select>
              </div>
              <div className="button-group">
                <button onClick={() => navigator.clipboard?.writeText(configCode)}>📋 Αντιγραφή</button>
                <button onClick={async () => { try { const text = await navigator.clipboard.readText(); applyCode(text); } catch { alert("Αδυναμία ανάγνωσης"); } }}>📥 Επικόλληση</button>
              </div>
              <div className="qr-container">
                <canvas id="qrCanvas" ref={qrCanvasRef} width="180" height="180"></canvas>
              </div>
              <p style={{fontSize:'0.8rem', color:'#99a6c9', textAlign:'center', marginTop:10}}>Σαρώστε για κοινή χρήση</p>
            </div>
          </div>
        </div>
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
