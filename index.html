<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Εκλογικό Μέτρο · Κουτσές Έδρες</title>
  <!-- QRCode library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #121212; color: #f1f1f1; padding: 16px 12px 32px; min-height: 100vh; }
    .app { max-width: 1400px; margin: 0 auto; }
    h1 { font-size: 2rem; font-weight: 700; text-align: center; margin-bottom: 24px; background: linear-gradient(135deg, #bb86fc, #03dac6); -webkit-background-clip: text; background-clip: text; color: transparent; line-height: 1.2; }
    .dashboard { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 24px; }
    @media (min-width: 900px) { .dashboard { grid-template-columns: 1fr 1fr 1.2fr; } }
    .card { background: #1e1e1e; border-radius: 24px; padding: 18px 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); border: 1px solid #333; height: fit-content; }
    .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .card-header h2 { font-size: 1.2rem; font-weight: 600; }
    .accent-bar { width: 6px; height: 24px; border-radius: 20px; }
    .party-list { display: flex; flex-direction: column; gap: 12px; }
    .party-row { display: flex; align-items: center; gap: 8px; }
    .party-color { width: 20px; height: 20px; border-radius: 8px; flex-shrink: 0; }
    .party-name-input { flex: 2; min-width: 0; }
    .party-name-input input { width: 100%; background: #2a2a2a; border: 1px solid #444; border-radius: 16px; padding: 12px 10px; color: white; font-size: 0.95rem; outline: none; }
    .vote-controls { display: flex; align-items: center; gap: 4px; }
    .vote-btn { width: 40px; height: 40px; border-radius: 30px; background: #2a2a2a; border: 1px solid #444; color: white; font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; touch-action: manipulation; }
    .vote-btn.disabled { opacity: 0.3; pointer-events: none; }
    .vote-input { width: 65px; background: #2a2a2a; border: 1px solid #444; border-radius: 20px; padding: 10px 4px; text-align: center; color: white; font-size: 1rem; outline: none; }
    .blank-badge { background: #333; padding: 4px 8px; border-radius: 40px; font-size: 0.7rem; color: #ccc; margin-left: 4px; }
    .reset-btn { background: rgba(207, 102, 121, 0.2); border: 1px solid #cf6679; color: #ffb3b3; padding: 12px 16px; border-radius: 40px; font-weight: 600; font-size: 0.9rem; width: 100%; margin-top: 12px; cursor: pointer; }
    .seats-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .seats-table th { text-align: left; padding-bottom: 8px; font-weight: 600; color: #aaa; font-size: 0.8rem; }
    .seats-table td { padding: 8px 0; border-bottom: 1px solid #333; }
    .party-cell { display: flex; align-items: center; gap: 8px; }
    .seats-number { font-weight: 700; font-size: 1.2rem; }
    .koutsi-badge { background: #03dac6; color: #121212; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; margin-left: 8px; }
    .log-box { background: #252525; border-radius: 16px; padding: 16px; margin-top: 20px; border: 1px solid #444; }
    .log-box h3 { margin-bottom: 10px; font-size: 1rem; color: #ccc; }
    .log-entry { font-size: 0.9rem; padding: 5px 0; border-bottom: 1px solid #333; }
    .log-entry:last-child { border-bottom: none; }
    .next-koutsi { margin-top: 12px; font-weight: 600; }
    .chart-container { height: 340px; width: 100%; }
    .settings-section { display: grid; grid-template-columns: 1fr; gap: 16px; }
    @media (min-width: 700px) { .settings-section { grid-template-columns: 1fr 1fr; } }
    .settings-grid { display: flex; flex-direction: column; gap: 14px; }
    .setting-item { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
    .setting-item label { width: 120px; font-size: 0.95rem; color: #ccc; }
    .setting-item input, .setting-item select { flex: 1; background: #2a2a2a; border: 1px solid #444; border-radius: 30px; padding: 12px 16px; color: white; font-size: 1rem; outline: none; }
    .quota-display { flex: 1; background: #2a2a2a; border: 1px solid #444; border-radius: 30px; padding: 12px 16px; text-align: center; font-weight: bold; color: #03dac6; font-size: 1.3rem; }
    .state-box { grid-column: 1 / -1; display: flex; flex-direction: column; gap: 10px; }
    .state-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .state-input { flex: 3; min-width: 200px; background: #2a2a2a; border: 1px solid #444; border-radius: 30px; padding: 12px 16px; color: white; font-family: monospace; font-size: 0.8rem; }
    .preset-select { flex: 1; min-width: 140px; background: #2a2a2a; border: 1px solid #444; border-radius: 30px; padding: 12px 16px; color: white; font-size: 0.9rem; outline: none; }
    .qr-container { display: flex; justify-content: center; margin-top: 8px; }
    #qrCanvas { background: white; padding: 8px; border-radius: 16px; max-width: 160px; height: auto; }
    .button-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .button-group button { flex: 1 0 120px; background: #333; border: 1px solid #555; border-radius: 40px; padding: 12px 0; color: white; font-weight: 600; font-size: 0.9rem; cursor: pointer; }
    .stats-row { display: flex; justify-content: space-around; margin: 16px 0 8px; }
    .stat { text-align: center; }
    .stat-value { font-size: 1.4rem; font-weight: 700; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; appearance: textfield; }
  </style>
  <!-- React, ReactDOM, Recharts, Babel -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.15.3/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
</head>
<body>
<div class="app">
  <h1>🗳️ Πόση ώρα θα σου πάρει να βρεις την έδρα</h1>
  <div id="root"></div>
</div>

<script type="text/babel">
  const { useState, useMemo, useCallback, useEffect, useRef } = React;
  const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, LabelList, Cell, ReferenceLine } = Recharts;

  // Σταθερά χρώματα
  const PARTY_COLORS = ["#f58231", "#3cb44b", "#e6194b", "#ffb6c1", "#4363d8", "#911eb4", "#46f0f0", "#aaaaaa", "#888888"];
  const DEFAULT_NAMES = ["ΠΑΣΠ", "ΚΚΕ", "ΕΑΑΚ", "ΑΡΑΝ", "ΝΑΡ", "ΔΑΠ", "ΣΣΠ", "Δίκτυο", "Λευκά"];

  const initialForces = [
    { id: "pasp", name: "ΠΑΣΠ", votes: 180, color: PARTY_COLORS[0] },
    { id: "kke", name: "ΚΚΕ", votes: 155, color: PARTY_COLORS[1] },
    { id: "eaak", name: "ΕΑΑΚ", votes: 110, color: PARTY_COLORS[2] },
    { id: "aran", name: "ΑΡΑΝ", votes: 22, color: PARTY_COLORS[3] },
    { id: "nar", name: "ΝΑΡ", votes: 11, color: PARTY_COLORS[4] },
    { id: "dap", name: "ΔΑΠ", votes: 27, color: PARTY_COLORS[5] },
    { id: "ssp", name: "ΣΣΠ", votes: 3, color: PARTY_COLORS[6] },
    { id: "diktyo", name: "Δίκτυο", votes: 0, color: PARTY_COLORS[7] },
    { id: "blank", name: "Λευκά", votes: 7, isWhite: true, color: PARTY_COLORS[8] },
  ];

  // Presets
  const PRESETS = {
    "CEID25": "7,0,1,148,150,107,33,5,36,2,4,11"
  };

  // --- Κωδικοποίηση κατάστασης με κόμμα ---
  // Μορφή: "έδρες,άκυρα,roundUp,ψήφος1,ψήφος2,...,ψήφος9"
  const encodeState = (seats, invalid, roundUp, forces) => {
    const votes = forces.map(f => f.votes);
    return [seats, invalid, roundUp ? 1 : 0, ...votes].join(',');
  };

  const decodeState = (code) => {
    const parts = code.split(',').map(p => parseInt(p, 10));
    if (parts.length !== 12) throw new Error("Λάθος μήκος κωδικού (αναμένονται 12 αριθμοί)");
    const seats = parts[0];
    const invalid = parts[1];
    const roundUp = parts[2] === 1;
    const votes = parts.slice(3);
    return { seats, invalid, roundUp, votes };
  };

  const App = () => {
    const [forces, setForces] = useState(initialForces);
    const [totalSeats, setTotalSeats] = useState(7);
    const [invalidVotes, setInvalidVotes] = useState(0);
    const [roundUp, setRoundUp] = useState(false);
    const [configCode, setConfigCode] = useState("");
    const [selectedPreset, setSelectedPreset] = useState("");
    const qrCanvasRef = useRef(null);

    // Τα λευκά προσμετρώνται στα έγκυρα (totalValidVotes) αλλά δεν συμμετέχουν στην κατανομή (validForces)
    const allVotes = useMemo(() => forces.reduce((s, f) => s + f.votes, 0), [forces]);
    const totalValidVotes = allVotes; // έγκυρα = όλα (λευκά + παρατάξεις)
    const validForces = useMemo(() => forces.filter(f => !f.isWhite), [forces]);

    const quota = useMemo(() => {
      const validSum = validForces.reduce((s, f) => s + f.votes, 0);
      if (validSum === 0 || totalSeats === 0) return 0;
      const raw = validSum / totalSeats;
      return roundUp ? Math.ceil(raw) : Math.floor(raw);
    }, [validForces, totalSeats, roundUp]);

    // Κατανομή εδρών (ίδιος αλγόριθμος)
    const { finalResults, seatLog, nextKoutsi, nextRemainder } = useMemo(() => {
      if (quota <= 0) return { finalResults: [], seatLog: [], nextKoutsi: null, nextRemainder: 0 };
      let temp = validForces.map(f => {
        const fullSeats = Math.floor(f.votes / quota);
        const remainder = f.votes - fullSeats * quota;
        return { ...f, fullSeats, finalSeats: fullSeats, remainder };
      });
      const log = [];
      const allocated = temp.reduce((s, r) => s + r.fullSeats, 0);
      let remaining = totalSeats - allocated;
      for (let i = 0; i < remaining; i++) {
        temp.sort((a, b) => b.remainder - a.remainder || b.votes - a.votes);
        const sel = temp[0];
        if (!sel) break;
        log.push(`Κουτσή έδρα #${i+1} ➜ ${sel.name} (υπόλοιπο ${sel.remainder})`);
        sel.finalSeats++;
        sel.remainder = 0;
      }
      temp.sort((a, b) => b.remainder - a.remainder || b.votes - a.votes);
      const next = temp[0];
      const nextName = next && next.remainder > 0 ? next.name : null;
      const nextRem = next ? next.remainder : 0;
      temp.sort((a, b) => b.votes - a.votes);
      return { finalResults: temp, seatLog: log, nextKoutsi: nextName, nextRemainder: nextRem };
    }, [validForces, totalSeats, quota]);

    // Αυτόματη ανανέωση κωδικού
    useEffect(() => {
      const code = encodeState(totalSeats, invalidVotes, roundUp, forces);
      setConfigCode(code);
    }, [forces, totalSeats, invalidVotes, roundUp]);

    // QR code generation
    useEffect(() => {
      if (qrCanvasRef.current && configCode) {
        QRCode.toCanvas(qrCanvasRef.current, configCode, { width: 160, margin: 1 }, (error) => {
          if (error) console.error(error);
        });
      }
    }, [configCode]);

    const applyCode = (code) => {
      try {
        const { seats, invalid, roundUp, votes } = decodeState(code);
        setTotalSeats(seats);
        setInvalidVotes(invalid);
        setRoundUp(roundUp);
        setForces(prev => prev.map((f, i) => ({ ...f, votes: votes[i] })));
        return true;
      } catch (e) {
        alert("Μη έγκυρος κωδικός κατάστασης");
        return false;
      }
    };

    const applyPreset = (presetKey) => {
      const code = PRESETS[presetKey];
      if (code) applyCode(code);
    };

    // Handlers
    const updateVote = (idx, delta) => {
      setForces(prev => {
        const upd = [...prev];
        upd[idx] = { ...upd[idx], votes: Math.max(0, upd[idx].votes + delta) };
        return upd;
      });
    };
    const setVote = (idx, val) => {
      const v = Math.max(0, parseInt(val) || 0);
      setForces(prev => { const upd = [...prev]; upd[idx] = { ...upd[idx], votes: v }; return upd; });
    };
    const updateName = (idx, name) => {
      setForces(prev => { const upd = [...prev]; upd[idx] = { ...upd[idx], name }; return upd; });
    };
    const resetVotes = () => setForces(prev => prev.map(f => ({ ...f, votes: 0 })));

    const renderCustomLabel = (props) => {
      const { x, y, width, height, index } = props;
      const e = finalResults[index];
      if (!e) return null;
      const rem = e.votes - Math.floor(e.votes / (quota || 1)) * (quota || 1);
      const isLast = seatLog.length > 0 && e.name === seatLog[seatLog.length-1].split("➜ ")[1];
      return (
        <React.Fragment>
          <text x={Number(x)+6} y={Number(y)+Number(height)/2} fill="#fff" fontSize={12} fontWeight="bold" dominantBaseline="middle">
            {`${e.name} - ${e.votes} - ${e.finalSeats} - [${rem}]`}
          </text>
          {isLast && (
            <text x={Number(x)+Number(width)+8} y={Number(y)+Number(height)/2} fill="#03dac6" fontSize={14} fontWeight="bold" dominantBaseline="middle">
              ΚΟΥΤΣΗ
            </text>
          )}
        </React.Fragment>
      );
    };

    return (
      <div>
        <div className="dashboard">
          {/* Στήλη 1 – Ψήφοι */}
          <div className="card">
            <div className="card-header">
              <div className="accent-bar" style={{background: '#bb86fc'}}></div>
              <h2>📋 Ψήφοι</h2>
            </div>
            <div className="party-list">
              {forces.map((f, i) => (
                <div key={f.id} className="party-row">
                  <div className="party-color" style={{backgroundColor: f.color}}></div>
                  <div className="party-name-input">
                    <input type="text" value={f.name} onChange={e => updateName(i, e.target.value)} />
                  </div>
                  <div className="vote-controls">
                    <div className={`vote-btn ${f.votes <= 0 ? 'disabled' : ''}`} onClick={() => updateVote(i, -1)}>–</div>
                    <input className="vote-input" type="number" min="0" value={f.votes} onChange={e => setVote(i, e.target.value)} />
                    <div className="vote-btn" onClick={() => updateVote(i, 1)}>+</div>
                  </div>
                  {f.isWhite && <span className="blank-badge">Λευκά</span>}
                </div>
              ))}
            </div>
            <button className="reset-btn" onClick={resetVotes}>⟲ Μηδενισμός ψήφων</button>
            <div className="stats-row">
              <div className="stat"><div className="stat-value">{totalValidVotes}</div><div>Έγκυρα</div></div>
              <div className="stat"><div className="stat-value">{invalidVotes}</div><div>Άκυρα</div></div>
              <div className="stat"><div className="stat-value">{forces.find(f=>f.isWhite)?.votes||0}</div><div>Λευκά</div></div>
            </div>
          </div>

          {/* Στήλη 2 – Κατανομή εδρών + Κατανομή Κουτσών */}
          <div className="card">
            <div className="card-header">
              <div className="accent-bar" style={{background: '#03dac6'}}></div>
              <h2>📊 Έδρες</h2>
            </div>
            <table className="seats-table">
              <thead><tr><th>Παράταξη</th><th>Έδρες</th></tr></thead>
              <tbody>
                {finalResults.map((f) => (
                  <tr key={f.id}>
                    <td><div className="party-cell"><div className="party-color" style={{backgroundColor: f.color}}></div>{f.name}</div></td>
                    <td>
                      <span className="seats-number">{f.finalSeats}</span>
                      {seatLog.length > 0 && f.name === seatLog[seatLog.length-1].split("➜ ")[1] && <span className="koutsi-badge">κουτσή</span>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div className="log-box">
              <h3>📌 Κατανομή Κουτσών</h3>
              {seatLog.length === 0 ? <p style={{color:'#aaa'}}>Καμία κουτσή έδρα</p> : seatLog.map((line, idx) => <div key={idx} className="log-entry">{line}</div>)}
              <div className="next-koutsi">Επόμενη κουτσή: <span style={{color:'#03dac6'}}>{nextKoutsi ? `${nextKoutsi} (υπ. ${nextRemainder})` : '—'}</span></div>
            </div>
          </div>

          {/* Στήλη 3 – Γράφημα */}
          <div className="card">
            <div className="card-header">
              <div className="accent-bar" style={{background: '#f58231'}}></div>
              <h2>📈 Γράφημα</h2>
            </div>
            <div className="chart-container">
              {finalResults.length > 0 && quota > 0 ? (
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={finalResults} layout="vertical" margin={{left: 60, right: 20}} barCategoryGap={2}>
                    <XAxis type="number" allowDecimals={false} stroke="#888" />
                    <YAxis type="category" dataKey="name" stroke="#ccc" width={70} tick={{fontSize:12}} />
                    <Tooltip contentStyle={{backgroundColor:"#1e1e1e", border:"1px solid #333"}} labelStyle={{color:"#fff"}} />
                    {[...Array(Math.floor(totalValidVotes / quota))].map((_,i)=>(
                      <ReferenceLine key={i} x={(i+1)*quota} stroke="#555" strokeDasharray="4 4" />
                    ))}
                    <Bar dataKey="votes" barSize={26} radius={[0,6,6,0]}>
                      <LabelList content={renderCustomLabel} />
                      {finalResults.map((entry) => <Cell key={entry.id} fill={entry.color} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              ) : <div style={{height:'100%', display:'flex', alignItems:'center', justifyContent:'center', color:'#888'}}>Δεν υπάρχουν δεδομένα</div>}
            </div>
          </div>
        </div>

        {/* Κάτω μέρος – Ρυθμίσεις & Κωδικός κατάστασης */}
        <div className="card">
          <div className="settings-section">
            <div className="settings-grid">
              <div className="setting-item">
                <label>🗳️ Έδρες</label>
                <input type="number" min="1" value={totalSeats} onChange={e => setTotalSeats(Math.max(1, parseInt(e.target.value)||1))} />
              </div>
              <div className="setting-item">
                <label>❌ Άκυρα</label>
                <input type="number" min="0" value={invalidVotes} onChange={e => setInvalidVotes(Math.max(0, parseInt(e.target.value)||0))} />
              </div>
            </div>
            <div className="settings-grid">
              <div className="setting-item">
                <label>📐 Στρογγυλ.</label>
                <select value={roundUp ? "up" : "down"} onChange={e => setRoundUp(e.target.value==="up")}>
                  <option value="down">Κάτω (⌊⌋)</option>
                  <option value="up">Πάνω (⌈⌉)</option>
                </select>
              </div>
              <div className="setting-item">
                <label>📏 Μέτρο</label>
                <div className="quota-display">{quota}</div>
              </div>
            </div>
            <div className="state-box">
              <div className="state-row">
                <input className="state-input" value={configCode} onChange={e => setConfigCode(e.target.value)} placeholder="Κωδικός κατάστασης" />
                <select className="preset-select" value={selectedPreset} onChange={e => { setSelectedPreset(e.target.value); if(e.target.value) applyPreset(e.target.value); }}>
                  <option value="">-- Presets --</option>
                  <option value="CEID25">CEID25</option>
                </select>
              </div>
              <div className="button-group">
                <button onClick={() => navigator.clipboard?.writeText(configCode)}>📋 Αντιγραφή</button>
                <button onClick={async () => { try { const text = await navigator.clipboard.readText(); applyCode(text); } catch { alert("Δεν επιτρέπεται η ανάγνωση προχείρου"); } }}>📥 Επικόλληση</button>
              </div>
              <div className="qr-container">
                <canvas id="qrCanvas" ref={qrCanvasRef} width="160" height="160"></canvas>
              </div>
              <p style={{fontSize:'0.75rem', color:'#aaa', marginTop:8, textAlign:'center'}}>
                Ο κωδικός ενημερώνεται αυτόματα. Σαρώστε το QR για άμεση μεταφορά.
              </p>
            </div>
          </div>
        </div>
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
